<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - App</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .success-icon { color: #28a745; }
        .error-icon { color: #E12B20; }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-header">
            <a href="javascript:history.back()" class="back-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </a>
            <h1 class="auth-title">Forgot password</h1>
        </div>

        <span class="auth-subtitle">
            Please, enter your email address. You will receive a link to create a new password via email.
        </span>

        <form id="forgotPasswordForm">
            <div class="custom-input-group" style="margin-bottom: 30px;">
                <span class="custom-label">Email</span>
                <input type="email" id="emailInput" class="custom-input" placeholder="Email" required autocomplete="off">
                
                <svg id="emailSuccess" class="custom-icon-right success-icon hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                <svg id="emailError" class="custom-icon-right error-icon hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
                <span id="emailErrorText" class="error-text hidden">Not a valid email address. Should be your@email.com</span>
            </div>

            <button type="submit" class="btn-red-pill">SEND</button>
        </form>

    </div>
    <script src="main.js"></script>
    <script>
        const forgotPasswordForm = document.getElementById('forgotPasswordForm');
        if (forgotPasswordForm) {
            forgotPasswordForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('emailInput').value;
                const btn = forgotPasswordForm.querySelector('button');
                
                btn.disabled = true;
                btn.innerHTML = 'LOADING...';

                try {
                    // API Call to Spring Boot
                    alert('Đã gửi yêu cầu đổi mật khẩu cho email: ' + email);
                    // Code thực tế: await fetch('/api/auth/forgot-password', { ... })
                } catch (err) {
                    alert('Lỗi kết nối');
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = 'SEND';
                }
            });
        }
    </script>
</body>
</html>
