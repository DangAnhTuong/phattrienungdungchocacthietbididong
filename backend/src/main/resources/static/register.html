<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up - App</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .svg-icon { width: 24px; height: 24px; }
        .success-icon { color: #28a745; }
        .error-icon { color: #E12B20; }
    </style>
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Facebook JS SDK -->
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js"></script>
</head>
<body>
    <div class="auth-page">
        <div class="auth-header">
            <a href="javascript:history.back()" class="back-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </a>
            <h1 class="auth-title">Sign up</h1>
        </div>

        <form id="registerForm">
            <div class="custom-input-group">
                <span class="custom-label">Name</span>
                <input type="text" id="nameInput" class="custom-input" placeholder="Name" required autocomplete="off">
            </div>

            <div class="custom-input-group">
                <span class="custom-label">Email</span>
                <input type="email" id="emailInput" class="custom-input" placeholder="Email" required autocomplete="off">
                
                <svg id="emailSuccess" class="custom-icon-right success-icon hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                <svg id="emailError" class="custom-icon-right error-icon hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
                <span id="emailErrorText" class="error-text hidden">Not a valid email address. Should be your@email.com</span>
            </div>

            <div class="custom-input-group">
                <input type="password" id="passwordInput" class="custom-input" placeholder="Password" required minlength="6">
            </div>

            <div class="forgot-pass-container">
                <a href="login.html" class="text-link">
                    Already have an account? <span class="arrow-red">&rarr;</span>
                </a>
            </div>

            <button type="submit" class="btn-red-pill">SIGN UP</button>
        </form>

        <div class="social-separator">Or sign up with social account</div>
        
        <div class="social-circle-group">
            <div class="social-circle-btn" onclick="handleGoogleLogin()">
                <svg viewBox="0 0 24 24" class="svg-icon">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
            </div>
            <div class="social-circle-btn" onclick="handleFacebookLogin()">
                <svg viewBox="0 0 24 24" class="svg-icon" fill="#1877F2">
                    <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                </svg>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
