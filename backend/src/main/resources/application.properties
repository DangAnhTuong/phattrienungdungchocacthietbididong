# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8080
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB

# ===============================
# POSTGRESQL DATABASE CONFIGURATION
# ===============================
# Thay đổi 'auth_db' thành tên database của bạn
spring.datasource.url=jdbc:postgresql://localhost:5432/auth_db
# Tên đăng nhập PostgreSQL của bạn (thường mặc định là postgres)
spring.datasource.username=postgres
# Mật khẩu PostgreSQL của bạn
spring.datasource.password=1
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
# update: Tự động tạo bảng nếu chưa có, cập nhật cột nếu có thay đổi trong Entity
spring.jpa.hibernate.ddl-auto=update
# Hiển thị câu lệnh SQL trên console để dễ debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# JWT CONFIGURATION
# ===============================
# Chuỗi bí mật dùng để mã hóa Token (Cần ít nhất 64 ký tự / 256-bit)
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# Thời gian hết hạn của token (tính bằng milliseconds). VD: 86400000 = 1 ngày
jwt.expiration=86400000

# ===============================
# SOCIAL LOGIN CONFIGURATION
